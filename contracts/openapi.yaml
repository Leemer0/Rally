                billing_plan_code: { type: string, enum: [free, pro] }
                status: { type: string }
                entitlements:
                  type: object
                  additionalProperties: true
            metrics:
              type: object
              required: [impressions, detail_viewers, plans, check_in_attempts, verified_check_ins, offers_unlocked, returning_visitors]
              properties:
                impressions: { type: integer, minimum: 0 }
                detail_viewers: { type: integer, minimum: 0 }
                plans: { type: integer, minimum: 0 }
                check_in_attempts: { type: integer, minimum: 0 }
                verified_check_ins: { type: integer, minimum: 0 }
                offers_unlocked: { type: integer, minimum: 0 }
                returning_visitors: { type: [integer, "null"], minimum: 0 }
            daily_activity:
              type: array
              items:
                type: object
                required: [date, impressions, detail_viewers, plans, verified_check_ins, offers_unlocked]
                properties:
                  date: { type: string, format: date }
                  impressions: { type: integer }
                  detail_viewers: { type: integer }
                  plans: { type: integer }
                  verified_check_ins: { type: integer }
                  offers_unlocked: { type: integer }
            check_ins_by_hour:
              type: array
              items:
                type: object
                required: [hour, count]
                properties:
                  hour: { type: integer, minimum: 0, maximum: 23 }
                  count: { type: integer, minimum: 0 }
            demographics:
              oneOf:
                - type: object
                  required: [cohort_size, average_age, gender]
                  properties:
                    cohort_size: { type: integer }
                    average_age: { type: integer }
                    gender:
                      type: object
                      required: [man, woman, other]
                      properties:
                        man: { type: integer, minimum: 0, maximum: 100, multipleOf: 5, description: Privacy-rounded percentage. }
                        woman: { type: integer, minimum: 0, maximum: 100, multipleOf: 5, description: Privacy-rounded percentage. }
                        other: { type: integer, minimum: 0, maximum: 100, multipleOf: 5, description: Privacy-rounded percentage. }
                - type: "null"
            demographics_suppressed: { type: boolean }
            offers:
              type: array
              items:
                type: object
                required: [offer_id, title, status, approval_state, claim_duration_seconds, unlocked_count]
                properties:
                  offer_id: { $ref: "#/components/schemas/UUID" }
                  title: { type: string }
                  status: { type: string }
                  approval_state: { type: string }
                  claim_duration_seconds: { type: [integer, "null"] }
                  unlocked_count: { type: integer }

