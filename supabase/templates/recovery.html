<!doctype html>
<html lang="en">
  <body style="margin:0;background:#080b10;color:#f7f7f2;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#080b10">
      <tr><td align="center" style="padding:40px 18px">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;border:1px solid #252a31;background:#0d1117">
          <tr><td style="padding:28px 32px 24px;border-bottom:1px solid #252a31">
            <img src="https://www.getoutly.app/brand/winged-o.png" width="64" alt="Outly" style="display:block;width:64px;height:auto;border:0">
          </td></tr>
          <tr><td style="padding:36px 32px 40px">
            <p style="margin:0 0 16px;color:#b8ff2c;font-family:Menlo,Consolas,monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase">Password reset</p>
            <h1 style="margin:0;color:#f7f7f2;font-size:34px;line-height:1.08;letter-spacing:-1px;font-weight:600">Choose a new password.</h1>
            <p style="margin:20px 0 0;color:#a4a8ae;font-size:16px;line-height:1.65">Use the secure link below to reset your Outly password. The link expires and can only be used once.</p>
            <table role="presentation" cellspacing="0" cellpadding="0" style="margin-top:30px"><tr><td bgcolor="#b8ff2c" style="border-radius:5px">
              <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:14px 22px;color:#080b10;font-size:15px;font-weight:650;text-decoration:none">Reset password</a>
            </td></tr></table>
            <p style="margin:30px 0 0;color:#666c74;font-size:12px;line-height:1.6">If you didn’t request this reset, no action is needed.</p>
          </td></tr>
          <tr><td style="padding:22px 32px;border-top:1px solid #252a31;color:#666c74;font-size:12px;line-height:1.6">Outly · Toronto, Canada<br>admin@getoutly.app</td></tr>
        </table>
      </td></tr>
    </table>
  </body>
</html>
